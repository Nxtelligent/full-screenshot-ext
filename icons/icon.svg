<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#4A90D9" />
  
  <!-- Screen/monitor shape -->
  <rect x="28" y="30" width="72" height="52" rx="4" ry="4" fill="white" stroke="white" stroke-width="2"/>
  
  <!-- Screen content - represents a page -->
  <rect x="34" y="36" width="60" height="40" rx="2" ry="2" fill="#E8F0FE"/>
  
  <!-- Lines representing content on screen -->
  <rect x="40" y="42" width="35" height="3" rx="1" fill="#4A90D9" opacity="0.6"/>
  <rect x="40" y="49" width="48" height="2" rx="1" fill="#4A90D9" opacity="0.3"/>
  <rect x="40" y="54" width="44" height="2" rx="1" fill="#4A90D9" opacity="0.3"/>
  <rect x="40" y="59" width="46" height="2" rx="1" fill="#4A90D9" opacity="0.3"/>
  <rect x="40" y="64" width="30" height="2" rx="1" fill="#4A90D9" opacity="0.3"/>
  
  <!-- Scroll arrow indicating full-page -->
  <polygon points="64,78 56,86 60,86 60,96 68,96 68,86 72,86" fill="white"/>
  
  <!-- Scissors/crop marks in corners to suggest "capture" -->
  <path d="M24,30 L24,24 L30,24" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M104,30 L104,24 L98,24" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M24,82 L24,88 L30,88" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M104,82 L104,88 L98,88" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
